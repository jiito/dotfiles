# remap prefix from 'C-b' to 'C-p'
unbind C-b
set-option -g prefix C-p
bind-key C-p send-prefix

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"


# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

setw -g mode-keys vi
setw -g mouse on

# move panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# zoom / full-screen current pane (built-in prefix+z still works)
bind -n M-f resize-pane -Z
bind f resize-pane -Z

# highlight when a pane is zoomed
set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "#{?window_zoomed_flag,fg=yellow bold,fg=#759AAB}"

# pane title bar — shows even with a single (zoomed) pane
set -g pane-border-status top
set -g pane-border-format "#{?window_zoomed_flag,#[bg=yellow#,fg=black#,bold]  ZOOMED — #P: #{pane_title}  ,#[bg=#759AAB#,fg=black#,bold] #P: #{pane_title}}"

# set a pane title: prefix + T
bind T command-prompt -p "Pane title:" "select-pane -T '%%'"

# status bar
set -g status-style "bg=#759AAB,fg=black"

# clear window-status formats (drop default #F flag suffixes like ! - # ~)
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# obvious active-window highlight
set -g window-status-current-style "bg=black,fg=yellow,bold"
set -g window-status-style "fg=black"

# quiet bell + activity styling so they don't masquerade as "active"
set -g window-status-bell-style "fg=black"
set -g window-status-activity-style "fg=black"
set -g monitor-bell off
set -g monitor-activity off
set -g visual-bell off
set -g bell-action none

set-option -g default-shell /bin/zsh

# plugins 

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'


run '~/.tmux/plugins/tpm/tpm'

set -g status-bg "#759AAB"
